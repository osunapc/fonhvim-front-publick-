<div class="min-h-screen bg-gray-50 flex flex-col font-sans relative">
  <app-encabezado></app-encabezado>
  <app-barra-navegacion></app-barra-navegacion>

  <main class="flex-grow container mx-auto px-4 py-8">
    <div class="bg-white rounded-xl shadow-sm p-8 border border-slate-100">
      <h1 class="text-3xl font-bold text-vinotinto mb-6 border-b pb-4">
        Galería Institucional
      </h1>

      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mt-8">
        @for (item of [1,2,3,4,5,6,7,8]; track item) {
        <div
          class="aspect-square bg-slate-100 rounded-lg overflow-hidden border border-slate-200 group relative cursor-pointer"
        >
          <div
            class="absolute inset-0 bg-vinotinto/0 group-hover:bg-vinotinto/20 transition-all flex items-center justify-center"
          >
            <span
              class="text-white opacity-0 group-hover:opacity-100 font-medium scale-90 group-hover:scale-100 transition-all"
            >
              Ver imagen
            </span>
          </div>
          <img
            [src]="'https://picsum.photos/seed/' + item + '/400/400'"
            alt="Obra FONHVIM"
            class="w-full h-full object-cover"
            loading="lazy"
          />
        </div>
        }
      </div>
    </div>
  </main>

  <footer class="bg-slate-800 text-white py-6 mt-auto">
    <div class="container mx-auto px-4 text-center text-sm">
      <p>&copy; {{ currentYear }} FONHVIM. Todos los derechos reservados.</p>
      <p class="mt-2 text-slate-400">Gobernación del Estado Mérida</p>
    </div>
  </footer>
</div>
