<div class="min-h-screen bg-slate-50 flex flex-col font-sans relative">
  <app-encabezado></app-encabezado>

  <div class="flex-grow flex">

    <aside class="w-64 bg-white border-r border-slate-200 hidden md:block">
      <nav class="p-4 space-y-2">
        <a
          href="/solicitudes"
          class="flex items-center space-x-3 p-3 bg-vinotinto text-white rounded-lg transition-all"
        >
          <span class="font-medium">Mis Solicitudes</span>
        </a>
        <a
          href="/"
          class="flex items-center space-x-3 p-3 text-slate-600 hover:bg-slate-50 rounded-lg transition-all"
        >
          <span class="font-medium">Volver al Portal</span>
        </a>
      </nav>
    </aside>

    <main class="flex-1 p-8">
      <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-8">
          <div>
            <h1 class="text-2xl font-bold text-vinotinto">
              Panel de Solicitudes
            </h1>
            <p class="text-slate-500">Gestiona tus trámites habitacionales</p>

          </button>
        </header>

        <div
          class="bg-white rounded-xl shadow-sm border border-slate-200 divide-y divide-slate-100"
        >
          <div class="p-12 text-center">
            <div
              class="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-4"
            >
              <span class="text-3xl text-slate-400">📋</span>
            </div>
            <h3 class="text-lg font-medium text-vinotinto">
              No tienes solicitudes activas
            </h3>
            <p class="text-slate-500 max-w-xs mx-auto mt-2">
              Inicia una nueva solicitud para comenzar tu trámite de vivienda o
              servicios.
            </p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <footer class="bg-white border-t border-slate-200 py-4">
    <div class="container mx-auto px-4 text-center text-xs text-slate-400">
      <p>&copy; {{ currentYear }} FONHVIM - Soporte Técnico</p>
    </div>
