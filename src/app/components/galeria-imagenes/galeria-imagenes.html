<div
  class="relative w-full h-full min-h-[400px] bg-gray-200 rounded-lg overflow-hidden group"
>
  <!-- Imagen Actual -->
  <div class="absolute inset-0 transition-opacity duration-500 ease-in-out">
    <img
      [src]="images[currentIndex]"
      alt="Galería Institucional"
      class="w-full h-full object-cover"
    />

    <!-- Overlay texto (opcional) -->
    <div
      class="absolute bottom-0 left-0 right-0 bg-black/50 text-white p-4 backdrop-blur-sm"
    >
      <h3 class="font-bold text-lg">
        Actividad Institucional {{ currentIndex + 1 }}
      </h3>
      <p class="text-sm opacity-90">
        Descripción breve de la actividad o evento destacado.
      </p>
    </div>
  </div>

  <!-- Controles -->
  <button
    (click)="prev()"
    class="absolute left-4 top-1/2 -translate-y-1/2 bg-white/20 hover:bg-white/40 backdrop-blur-md text-white p-2 rounded-full transition-all opacity-0 group-hover:opacity-100 focus:opacity-100"
  >
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M15 19l-7-7 7-7"
      ></path>
    </svg>
  </button>

  <button
    (click)="next()"
    class="absolute right-4 top-1/2 -translate-y-1/2 bg-white/20 hover:bg-white/40 backdrop-blur-md text-white p-2 rounded-full transition-all opacity-0 group-hover:opacity-100 focus:opacity-100"
  >
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M9 5l7 7-7 7"
      ></path>
    </svg>
  </button>

  <!-- Indicadores -->
  <div class="absolute bottom-20 left-1/2 -translate-x-1/2 flex gap-2">
    @for (img of images; track img; let i = $index) {
    <button
      (click)="setIndex(i)"
      class="w-2 h-2 rounded-full transition-all"
      [ngClass]="
        i === currentIndex ? 'bg-white w-4' : 'bg-white/50 hover:bg-white/80'
      "
    ></button>
    }
  </div>
</div>
