<div
  class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-md p-4"
>
  <div
    class="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden animate-fade-in-up border border-slate-100"
  >
    <!-- Header del Modal -->
    <div
      class="bg-vinotinto p-5 flex justify-between items-center text-white shadow-sm"
    >
      <h3 class="font-bold tracking-widest text-sm">INGRESO AL SISTEMA</h3>
      <button
        (click)="close.emit()"
        class="text-white/80 hover:text-white transition-colors focus:outline-none"
      >
        <svg
          class="w-6 h-6"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M6 18L18 6M6 6l12 12"
          ></path>
        </svg>
      </button>
    </div>

    <!-- Body -->
    <div class="p-10">
      <div class="text-center mb-8">
        <img
          src="logof.png"
          alt="FONHVIM"
          class="h-20 mx-auto mb-4 drop-shadow-sm"
        />
        <p class="text-slate-500 text-sm font-medium">
          Bienvenido(a). Ingrese sus credenciales.
        </p>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
        <div>
          <label
            class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2"
            >Correo Electrónico</label
          >
          <div class="relative group">
            <span
              class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400 group-focus-within:text-vin-500 transition-colors"
            >
              <svg
                class="h-5 w-5"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"
                />
              </svg>
            </span>
            <input
              type="email"
              formControlName="email"
              class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-vinotinto/20 focus:border-vinotinto focus:bg-white transition-all text-sm outline-none"
              placeholder="ejemplo@fonhvim.gob.ve"
            />
          </div>
        </div>

        <div>
          <label
            class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2"
            >Contraseña</label
          >
          <div class="relative group">
            <span
              class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400 group-focus-within:text-vin-500 transition-colors"
            >
              <svg
                class="h-5 w-5"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
                />
              </svg>
            </span>
            <input
              type="password"
              formControlName="password"
              class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-vinotinto/20 focus:border-vinotinto focus:bg-white transition-all text-sm outline-none"
              placeholder="••••••••"
            />
          </div>
        </div>

        <button
          type="submit"
          [disabled]="loginForm.invalid"
          class="w-full bg-vinotinto hover:bg-vinotinto-hover text-white font-bold py-3 px-4 rounded-lg shadow-lg shadow-vinotinto/20 transition-all active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed mt-2 uppercase tracking-widest text-sm"
        >
          INGRESAR
        </button>
      </form>
    </div>

    <!-- Footer -->
    <div class="bg-slate-50 p-5 text-center border-t border-slate-100">
      <a href="#" class="text-xs text-vinotinto font-semibold hover:underline"
        >Políticas de Privacidad y Términos de Uso</a
      >
    </div>
  </div>
</div>
