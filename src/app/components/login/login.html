<div
  class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm p-4"
>
  <div
    class="bg-white rounded-lg shadow-2xl w-full max-w-md overflow-hidden animate-fade-in-up"
  >
    <!-- Header del Modal -->
    <div class="bg-vinotinto p-4 flex justify-between items-center text-white">
      <h3 class="font-bold tracking-wide">INGRESO AL SISTEMA</h3>
      <button
        (click)="close.emit()"
        class="text-white hover:text-gray-300 focus:outline-none"
      >
        <svg
          class="w-6 h-6"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M6 18L18 6M6 6l12 12"
          ></path>
        </svg>
      </button>
    </div>

    <!-- Body -->
    <div class="p-8">
      <div class="text-center mb-6">
        <img
          src="logof.png"
          alt="FONHVIM"
          class="h-16 mx-auto mb-2 opacity-80"
        />
        <p class="text-gray-500 text-sm">
          Ingrese sus credenciales para continuar
        </p>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1"
            >Correo Electrónico</label
          >
          <div class="relative">
            <span
              class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-500"
            >
              <svg
                class="h-5 w-5"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"
                />
              </svg>
            </span>
            <input
              type="email"
              formControlName="email"
              class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-md focus:ring-vinotinto focus:border-vinotinto text-sm"
              placeholder="ejemplo@fonhvim.gob.ve"
            />
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1"
            >Contraseña</label
          >
          <div class="relative">
            <span
              class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-500"
            >
              <svg
                class="h-5 w-5"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
                />
              </svg>
            </span>
            <input
              type="password"
              formControlName="password"
              class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-md focus:ring-vinotinto focus:border-vinotinto text-sm"
              placeholder="••••••••"
            />
          </div>
        </div>

        <button
          type="submit"
          [disabled]="loginForm.invalid"
          class="w-full bg-vinotinto hover:bg-vinotinto-hover text-white font-bold py-2 px-4 rounded-md shadow transition-colors disabled:opacity-50 disabled:cursor-not-allowed mt-4"
        >
          INGRESAR
        </button>
      </form>
    </div>

    <!-- Footer -->
    <div class="bg-gray-50 p-4 text-center border-t border-gray-100">
      <a href="#" class="text-xs text-blue-600 hover:underline"
        >Políticas de Privacidad y Términos de Uso</a
      >
    </div>
  </div>
</div>
