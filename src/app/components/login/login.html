<div
  class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-md p-4"
>
  <div
    class="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden animate-fade-in-up border border-slate-100"
  >
    <!-- Header del Modal -->
    <div
      class="bg-vinotinto p-5 flex justify-between items-center text-white shadow-sm"
    >
      <h3 class="font-bold tracking-widest text-sm">INGRESO AL SISTEMA</h3>
      <button
        (click)="close.emit()"
        class="text-white/80 hover:text-white transition-colors focus:outline-none"
      >
        <svg
          class="w-6 h-6"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M6 18L18 6M6 6l12 12"
          ></path>
        </svg>
      </button>
    </div>

    <!-- Body -->
    <div class="p-10">
      <div class="text-center mb-8">
        <img
          src="logof.png"
          alt="FONHVIM"
          class="h-20 mx-auto mb-4 drop-shadow-sm"
        />
        <p class="text-slate-500 text-sm font-medium">
          Bienvenido(a). Ingrese sus credenciales.
        </p>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
        <div>
          <label
            class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2"
            >Correo Electrónico</label
          >
          <div class="relative group">
            <span
              class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400 group-focus-within:text-vin-500 transition-colors"
            >
              <svg
                class="h-5 w-5"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"
                />
              </svg>
            </span>
            <input
              type="email"
              formControlName="email"
              class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-vinotinto/20 focus:border-vinotinto focus:bg-white transition-all text-sm outline-none"
              placeholder="ejemplo@fonhvim.gob.ve"
            />
          </div>
        </div>

        <div>
          <label
            class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2"
            >Contraseña</label
          >
          <div class="relative group">
            <span
              class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400 group-focus-within:text-vin-500 transition-colors"
            >
              <svg
                class="h-5 w-5"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
                />
              </svg>
            </span>
            <input
              [type]="showPassword ? 'text' : 'password'"
              formControlName="password"
              class="w-full pl-10 pr-12 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-vinotinto/20 focus:border-vinotinto focus:bg-white transition-all text-sm outline-none"
              placeholder="••••••••"
            />
            <button
              type="button"
              (click)="togglePasswordVisibility()"
              class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-vinotinto transition-colors focus:outline-none"
            >
              @if (!showPassword) {
                <svg
                  class="h-5 w-5"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                  />
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                  />
                </svg>
              }
              @if (showPassword) {
                <svg
                  class="h-5 w-5"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"
                  />
                </svg>
              }
            </button>
          </div>
          <div class="mt-2 text-right">
            <button
              type="button"
              (click)="openForgotPassword.emit()"
              class="text-vinotinto text-xs font-bold hover:underline focus:outline-none"
            >
              ¿Olvidaste tu contraseña?
            </button>
          </div>
        </div>

        <div class="flex flex-col gap-3 mt-2">
          <button
            type="submit"
            [disabled]="loginForm.invalid"
            class="w-full bg-vinotinto hover:bg-vinotinto-hover text-white font-bold py-3 px-4 rounded-lg shadow-lg shadow-vinotinto/20 transition-all active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed uppercase tracking-widest text-sm"
          >
            INGRESAR
          </button>

          <button
            type="button"
            (click)="close.emit()"
            class="w-full bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-3 px-4 rounded-lg transition-all active:scale-[0.98] uppercase tracking-widest text-xs flex items-center justify-center gap-2"
          >
            <svg
              class="w-4 h-4"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M10 19l-7-7m0 0l7-7m-7 7h18"
              ></path>
            </svg>
            Regresar a inicio
          </button>
        </div>

        <div class="mt-4 text-center">
          <p class="text-xs text-slate-500">
            ¿No tienes una cuenta?
            <button
              type="button"
              (click)="openRegister.emit()"
              class="text-vinotinto font-bold hover:underline focus:outline-none"
            >
              Regístrate gratis
            </button>
          </p>
        </div>
      </form>
    </div>

    <!-- Footer -->
    <div
      class="bg-slate-50 p-5 text-center border-t border-slate-100 flex flex-col gap-2"
    >
      <a
        href="#"
        class="text-[10px] text-slate-400 hover:text-vinotinto transition-colors"
        >Políticas de Privacidad y Términos de Uso</a
      >
      <p
        class="text-[9px] text-slate-300 uppercase tracking-widest font-medium"
      >
        Gobernación del Estado Mérida
      </p>
    </div>
  </div>
</div>
